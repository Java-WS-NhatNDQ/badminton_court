spring.application.name=badminton_court

## Server Configuration
server.port=8080

## Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/badminton_court_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER_NAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# jwt
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.example=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n

# DB init
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:db/data-init.sql
spring.jpa.defer-datasource-initialization=true

# spring starter mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
management.health.mail.enabled=false

spring.mail.username=${MAIL_USER_NAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# hikari configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# cloudinary configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.connection-timeout=30000
cloudinary.read-timeout=30000
