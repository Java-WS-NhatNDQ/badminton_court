spring.application.name=badminton_court

## Server Configuration
server.port=8080

## Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/badminton_court_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# jwt
app.jwt.secret=$what_is_my_destination_of_this_time
app.jwt.access-token-expiration-ms: 1800000
app.jwt.refresh-token-expiration-ms: 604800000

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.example=DEBUG

# Jackson Configuration
